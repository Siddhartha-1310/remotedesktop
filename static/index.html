<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Remote Desktop — Controller</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

    #topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#141414;border-bottom:1px solid #222;flex-shrink:0}
    #topbar h1{font-size:14px;font-weight:600;color:#fff}
    .spacer{flex:1}
    .badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;border:1px solid transparent}
    .badge-gray{background:#1e1e1e;color:#666;border-color:#2a2a2a}
    .badge-green{background:#0d2e1a;color:#4ade80;border-color:#166534}
    .badge-amber{background:#2e1d0d;color:#fbbf24;border-color:#92400e}
    .badge-red{background:#2e0d0d;color:#f87171;border-color:#7f1d1d}
    #stats{font-size:11px;color:#555;font-family:monospace}

    #toolbar{display:flex;align-items:center;gap:6px;padding:6px 14px;background:#111;border-bottom:1px solid #1c1c1c;flex-shrink:0;flex-wrap:wrap}
    input[type=text]{background:#1a1a1a;color:#ccc;border:1px solid #2a2a2a;border-radius:6px;padding:4px 8px;font-size:12px}
    input[type=text]:focus{outline:none;border-color:#3b82f6}
    select{background:#1a1a1a;color:#ccc;border:1px solid #2a2a2a;border-radius:6px;padding:4px 8px;font-size:12px}
    button{background:#1e1e1e;color:#bbb;border:1px solid #2a2a2a;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;transition:all .15s}
    button:hover{background:#2a2a2a;color:#fff}
    button:disabled{opacity:.35;cursor:default}
    .btn-primary{background:#1d4ed8;color:#fff;border-color:#1e40af}
    .btn-primary:hover{background:#2563eb}
    .btn-danger{background:#7f1d1d;color:#fca5a5;border-color:#991b1b}
    .label{font-size:11px;color:#555}

    #screen-area{flex:1;display:flex;align-items:center;justify-content:center;background:#060606;position:relative;overflow:hidden}
    #screen-canvas{max-width:100%;max-height:100%;display:block;cursor:crosshair;border:1px solid #1a1a1a}
    #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#060606;transition:opacity .3s}
    #overlay.hidden{opacity:0;pointer-events:none}
    #overlay p{font-size:13px;color:#555;text-align:center;max-width:280px;line-height:1.6}

    #logbar{height:88px;background:#080808;border-top:1px solid #161616;overflow-y:auto;padding:6px 14px;flex-shrink:0}
    #logbar p{font-size:11px;font-family:monospace;line-height:1.7;color:#444}
    #logbar p.ok{color:#4ade80}
    #logbar p.warn{color:#fbbf24}
    #logbar p.err{color:#f87171}
    #logbar p.info{color:#60a5fa}
  </style>
</head>
<body>

<div id="topbar">
  <h1>Remote Desktop</h1>
  <span id="s-badge" class="badge badge-gray">Disconnected</span>
  <span id="w-badge" class="badge badge-gray" style="display:none">WebRTC Live</span>
  <div class="spacer"></div>
  <div id="stats">–</div>
</div>

<div id="toolbar">
  <span class="label">Server:</span>
  <input id="t-server" type="text" value="ws://localhost:8080/ws" style="width:210px"/>
  <span class="label">Session:</span>
  <input id="t-session" type="text" value="default" style="width:90px"/>
  <button id="btn-connect" class="btn-primary" onclick="connect()">Connect</button>
  <button id="btn-disc" disabled onclick="disconnect()">Disconnect</button>
  <div class="spacer"></div>
  <span class="label">Quality:</span>
  <select id="sel-q">
    <option value="low">Low (fast)</option>
    <option value="med" selected>Medium</option>
    <option value="high">High</option>
  </select>
  <button onclick="sendCAD()" title="Ctrl+Alt+Del">CAD</button>
  <button onclick="sendWinKey()">Win</button>
  <button onclick="toggleFs()">Fullscreen</button>
</div>

<div id="screen-area">
  <canvas id="screen-canvas"></canvas>
  <div id="overlay">
    <p style="font-size:28px">🖥</p>
    <p>Enter the server address and session ID,<br>then click <strong style="color:#aaa">Connect</strong></p>
    <p style="font-size:11px;color:#333">The agent (Laptop B) must be running<br>with the same session ID</p>
  </div>
</div>

<div id="logbar"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let ws = null, pc = null, screenDC = null, inputDC = null
let connected = false, frameCount = 0, totalBytes = 0, lastFpsT = performance.now()
let inputLock = false   // prevent sending input before channel is ready

const canvas = document.getElementById('screen-canvas')
const ctx = canvas.getContext('2d')

// ── Log ──────────────────────────────────────────────────────────────────────
function log(msg, cls = '') {
  const b = document.getElementById('logbar')
  const p = document.createElement('p')
  if (cls) p.className = cls
  p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
  b.appendChild(p)
  b.scrollTop = b.scrollHeight
  if (b.children.length > 200) b.removeChild(b.children[0])
}

// ── Status badge ─────────────────────────────────────────────────────────────
function setStatus(label, cls) {
  const b = document.getElementById('s-badge')
  b.textContent = label
  b.className = `badge badge-${cls}`
}

// ── Connect ──────────────────────────────────────────────────────────────────
async function connect() {
  const url = document.getElementById('t-server').value.trim()
  const sid = document.getElementById('t-session').value.trim() || 'default'
  if (!url) return

  document.getElementById('btn-connect').disabled = true
  setStatus('Connecting…', 'amber')
  log(`Connecting to ${url} | session: ${sid}`)

  ws = new WebSocket(url)

  ws.onopen = () => {
    log('WebSocket connected', 'ok')
    ws.send(JSON.stringify({ type: 'register', role: 'controller', session_id: sid }))
    document.getElementById('btn-disc').disabled = false
  }

  ws.onmessage = async (ev) => {
    const msg = JSON.parse(ev.data)
    log(`← ${msg.type}`)

    if (msg.type === 'session-id') {
      log(`Session ID confirmed: ${msg.payload}`, 'info')
      return
    }

    if (msg.type === 'target-connected') {
      log('Target (Laptop B) is online — setting up WebRTC', 'ok')
      setStatus('Target found', 'amber')
      await setupWebRTC()
      // Tell agent (via server) that controller is ready
      ws.send(JSON.stringify({ type: 'ready' }))
      return
    }

    if (msg.type === 'target-disconnected') {
      log('Target disconnected', 'warn')
      setStatus('Target offline', 'amber')
      return
    }

    if (msg.type === 'offer') {
      log('SDP offer received from agent')
      const offer = JSON.parse(msg.payload)
      await pc.setRemoteDescription(offer)
      const answer = await pc.createAnswer()
      await pc.setLocalDescription(answer)
      ws.send(JSON.stringify({ type: 'answer', payload: JSON.stringify(answer) }))
      log('SDP answer sent')
      return
    }

    if (msg.type === 'ice-candidate' && pc && msg.payload) {
      try { await pc.addIceCandidate(JSON.parse(msg.payload)) }
      catch(e) { log(`ICE error: ${e.message}`, 'warn') }
    }
  }

  ws.onerror = () => { log('WebSocket error', 'err'); setStatus('Error', 'red') }
  ws.onclose = () => {
    log('WebSocket closed', 'warn')
    document.getElementById('btn-connect').disabled = false
    document.getElementById('btn-disc').disabled = true
    if (!connected) setStatus('Disconnected', 'gray')
  }
}

// ── WebRTC ────────────────────────────────────────────────────────────────────
async function setupWebRTC() {
  pc = new RTCPeerConnection({
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]
  })

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) ws.send(JSON.stringify({ type: 'ice-candidate', payload: JSON.stringify(candidate) }))
  }

  pc.onconnectionstatechange = () => {
    log(`WebRTC → ${pc.connectionState}`)
    if (pc.connectionState === 'connected') {
      connected = true
      setStatus('Connected', 'green')
      document.getElementById('w-badge').style.display = ''
      document.getElementById('overlay').classList.add('hidden')
      log('WebRTC P2P connected — screen streaming active', 'ok')
    } else if (['disconnected','failed','closed'].includes(pc.connectionState)) {
      connected = false
      setStatus('Disconnected', 'gray')
      document.getElementById('overlay').classList.remove('hidden')
      document.getElementById('w-badge').style.display = 'none'
    }
  }

  // Receive data channels that the agent created
  pc.ondatachannel = ({ channel }) => {
    log(`Data channel: "${channel.label}"`)

    if (channel.label === 'screen') {
      channel.binaryType = 'arraybuffer'
      channel.onmessage = ({ data }) => renderFrame(data)
      log('Screen channel ready', 'ok')
    }

    if (channel.label === 'input') {
      inputDC = channel
      inputDC.onopen = () => {
        log('Input channel ready — keyboard + mouse active', 'ok')
        setupInput()
      }
    }
  }
}

// ── Frame rendering ───────────────────────────────────────────────────────────
let latestFrame = null
function renderFrame(data) {
  totalBytes += data.byteLength
  frameCount++
  latestFrame = data

  const blob = new Blob([data], { type: 'image/jpeg' })
  const url = URL.createObjectURL(blob)
  const img = new Image()
  img.onload = () => {
    if (canvas.width !== img.width) canvas.width = img.width
    if (canvas.height !== img.height) canvas.height = img.height
    ctx.drawImage(img, 0, 0)
    URL.revokeObjectURL(url)
  }
  img.src = url

  const now = performance.now()
  if (now - lastFpsT >= 1000) {
    const fps = (frameCount / ((now - lastFpsT) / 1000)).toFixed(1)
    const kbps = ((totalBytes * 8) / 1000 / ((now - lastFpsT) / 1000)).toFixed(0)
    document.getElementById('stats').textContent = `${fps} fps · ${kbps} kbps`
    frameCount = 0; totalBytes = 0; lastFpsT = now
  }
}

// ── Input capture ─────────────────────────────────────────────────────────────
function setupInput() {
  canvas.addEventListener('mousemove', onMouse, { passive: false })
  canvas.addEventListener('mousedown', onMouse, { passive: false })
  canvas.addEventListener('mouseup', onMouse, { passive: false })
  canvas.addEventListener('wheel', onWheel, { passive: false })
  canvas.addEventListener('contextmenu', e => e.preventDefault())
  document.addEventListener('keydown', onKey, { capture: true })
  document.addEventListener('keyup', onKey, { capture: true })
  log('Input capture active')
}

function sendInput(obj) {
  if (!inputDC || inputDC.readyState !== 'open') return
  try { inputDC.send(JSON.stringify(obj)) } catch(e) {}
}

function onMouse(e) {
  e.preventDefault()
  const r = canvas.getBoundingClientRect()
  sendInput({
    type: e.type,
    x: ((e.clientX - r.left) / r.width) * 100,
    y: ((e.clientY - r.top) / r.height) * 100,
    button: e.button
  })
}

function onWheel(e) {
  e.preventDefault()
  sendInput({ type: 'scroll', deltaY: e.deltaY })
}

function onKey(e) {
  // Allow F5, F12, Ctrl+T etc for browser dev — only block when canvas focused
  e.preventDefault()
  sendInput({ type: e.type, key: e.key, code: e.code })
}

// ── Special keys ──────────────────────────────────────────────────────────────
function sendCAD() {
  ['Control','Alt','Delete'].forEach(k => sendInput({ type: 'keydown', key: k, code: k }))
  setTimeout(() => {
    ['Delete','Alt','Control'].forEach(k => sendInput({ type: 'keyup', key: k, code: k }))
  }, 80)
  log('Sent Ctrl+Alt+Del')
}

function sendWinKey() {
  sendInput({ type: 'keydown', key: 'Meta', code: 'MetaLeft' })
  setTimeout(() => sendInput({ type: 'keyup', key: 'Meta', code: 'MetaLeft' }), 80)
  log('Sent Win key')
}

// ── Fullscreen ────────────────────────────────────────────────────────────────
function toggleFs() {
  if (!document.fullscreenElement) {
    document.getElementById('screen-area').requestFullscreen()
  } else {
    document.exitFullscreen()
  }
}

// ── Disconnect ────────────────────────────────────────────────────────────────
function disconnect() {
  inputDC?.close(); inputDC = null
  pc?.close(); pc = null
  ws?.close(); ws = null
  connected = false
  setStatus('Disconnected', 'gray')
  document.getElementById('overlay').classList.remove('hidden')
  document.getElementById('w-badge').style.display = 'none'
  document.getElementById('btn-connect').disabled = false
  document.getElementById('btn-disc').disabled = true
  document.getElementById('stats').textContent = '–'
  log('Disconnected')
}

log('Controller ready — enter server URL and session ID to begin')
</script>
</body>
</html>
